name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source lib
        uses: actions/checkout@v4
        with:
          path: capullo-source-radiobrowser
      # Sibling checkout so settings.gradle.kts `includeBuild("../capullo-audio-contracts")`
      # resolves. Both repos are public → default token can read the contracts repo.
      - name: Checkout contracts (sibling for includeBuild)
        uses: actions/checkout@v4
        with:
          repository: capullo-tech/capullo-audio-contracts
          path: capullo-audio-contracts
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      # ubuntu-latest ships the Android SDK; NewPipeExtractor resolves from jitpack.
      - name: Assemble harness APK
        working-directory: capullo-source-radiobrowser
        run: ./gradlew :app:assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capullo-source-radiobrowser-harness-${{ github.sha }}
          path: 'capullo-source-radiobrowser/**/build/outputs/apk/debug/*.apk'
